<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body
    class="bg-light d-flex justify-content-center align-items-center min-vh-100"
  >
    <form
      method="get"
      class="bg-white border rounded p-4 shadow-sm"
      style="max-width: 500px; min-width: 400px; width: 100%"
    >
      <h1 class="h4 text-center m-4">Get in Touch</h1>

      <div class="mb-3">
        <label for="name" class="form-label">Your Name</label>
        <input
          type="text"
          id="name"
          name="name"
          class="form-control"
          placeholder="John Doe"
        />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="you@example.com"
        />
      </div>

      <div class="mb-3">
        <label for="subject" class="form-label">Subject</label>
        <input
          type="text"
          id="subject"
          name="subject"
          class="form-control"
          placeholder="Project inquiry, collaboration, etc."
        />
      </div>

      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea
          id="message"
          name="message"
          class="form-control"
          rows="5"
          placeholder="What's up?"
        ></textarea>
      </div>

      <div class="mb-3 row align-items-center">
        <div class="col-sm-6">
          <label class="form-label mb-1">Preferred reply method</label>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="contactMethod"
              id="replyEmail"
              value="email"
              checked
            />
            <label class="form-check-label" for="replyEmail">Email</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="contactMethod"
              id="replyPhone"
              value="phone"
            />
            <label class="form-check-label" for="replyPhone">Phone</label>
          </div>
        </div>
        <div class="col-sm-6">
          <label for="availability" class="form-label"
            >Best time to reach you</label
          >
          <select id="availability" name="availability" class="form-select">
            <option value="">Choose a time</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
          </select>
        </div>
      </div>

      <div class="d-flex gap-2 mb-3">
        <input
          type="submit"
          value="Send Message"
          class="btn btn-primary flex-grow-1"
        />
        <input
          type="reset"
          value="Clear"
          class="btn btn-outline-secondary flex-grow-1"
        />
      </div>

      <p class="text-muted small mb-0">
        This is a contact form for reaching out about projects, questions, or
        collaborations.
      </p>
    </form>
  </body>
</html>
